# dbt project configuration.
# Run `dbt run`, `dbt test`, etc. from this directory (cd dbt).

name: 'modern_data_platform'
version: '1.0.0'
config-version: 2

# This profile name must match an entry in your profiles.yml.
# See profiles.example.yml in this directory for a starter template.
profile: 'modern_data_platform'

# Path configuration (relative to this file)
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Default materialization strategy per layer.
# Override per-model with {{ config(materialized='...') }} where needed.
models:
  modern_data_platform:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

# Source freshness defaults (per-source overrides live in tests/schema.yml).
sources:
  modern_data_platform:
    legacy:
      +loaded_at_field: _ingested_at

# Quote identifiers consistently across adapters.
quoting:
  database: false
  schema: false
  identifier: false

# Variables available via {{ var('...') }} in models.
vars:
  default_currency: 'USD'
  pii_columns: ['email', 'first_name', 'last_name']
