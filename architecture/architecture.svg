<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e6edf3" font-size="15" font-weight="bold" text-anchor="middle">Modern Data Platform Migration</text>
  <text x="450" y="54" fill="#8b949e" font-size="11" text-anchor="middle">Legacy ETL → Cloud-Native ELT on AWS + Snowflake + dbt</text>

  <!-- BEFORE column -->
  <text x="150" y="84" fill="#f85149" font-size="12" font-weight="bold" text-anchor="middle">BEFORE</text>
  <rect x="40" y="92" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="115" fill="#f85149" font-size="11" text-anchor="middle">Cron Jobs on EC2</text>

  <rect x="40" y="140" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="163" fill="#f85149" font-size="11" text-anchor="middle">Stored Procedures (OLTP)</text>

  <rect x="40" y="188" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="211" fill="#f85149" font-size="11" text-anchor="middle">No Schema Enforcement</text>

  <rect x="40" y="236" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="259" fill="#f85149" font-size="11" text-anchor="middle">No Data Quality Tests</text>

  <rect x="40" y="284" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="307" fill="#f85149" font-size="11" text-anchor="middle">Manual Incident Response</text>

  <rect x="40" y="332" width="220" height="36" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.7"/>
  <text x="150" y="355" fill="#f85149" font-size="11" text-anchor="middle">No Cost Visibility</text>

  <!-- Arrow -->
  <line x1="300" y1="260" x2="370" y2="260" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="370,255 380,260 370,265" fill="#58a6ff"/>
  <text x="340" y="250" fill="#58a6ff" font-size="10" text-anchor="middle">migrate</text>

  <!-- AFTER column -->
  <text x="580" y="84" fill="#3fb950" font-size="12" font-weight="bold" text-anchor="middle">AFTER</text>
  <rect x="400" y="92" width="460" height="36" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="630" y="110" fill="#3fb950" font-size="11" text-anchor="middle">Legacy OLTP Sources (Postgres, MySQL, Oracle, SFTP)</text>
  <text x="630" y="122" fill="#8b949e" font-size="10" text-anchor="middle">raw data, SFTP files, API events</text>

  <!-- Arrow down -->
  <line x1="630" y1="128" x2="630" y2="148" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="625,148 630,156 635,148" fill="#30363d"/>

  <rect x="400" y="156" width="460" height="36" rx="6" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
  <text x="630" y="174" fill="#58a6ff" font-size="11" text-anchor="middle">Airflow (MWAA) — DAG Orchestration</text>
  <text x="630" y="186" fill="#8b949e" font-size="10" text-anchor="middle">retry logic, SLA monitoring, backfill support</text>

  <line x1="630" y1="192" x2="630" y2="212" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="625,212 630,220 635,212" fill="#30363d"/>

  <rect x="400" y="220" width="460" height="36" rx="6" fill="#21262d" stroke="#e3b341" stroke-width="1"/>
  <text x="630" y="238" fill="#e3b341" font-size="11" text-anchor="middle">S3 Raw Layer (KMS-encrypted, append-only)</text>
  <text x="630" y="250" fill="#8b949e" font-size="10" text-anchor="middle">immutable audit trail, enable full reprocessing</text>

  <line x1="630" y1="256" x2="630" y2="276" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="625,276 630,284 635,276" fill="#30363d"/>

  <!-- Snowflake layers -->
  <rect x="400" y="284" width="460" height="104" rx="6" fill="#161b22" stroke="#29b5e8" stroke-width="1"/>
  <text x="630" y="302" fill="#29b5e8" font-size="11" font-weight="bold" text-anchor="middle">Snowflake</text>
  <rect x="420" y="308" width="420" height="18" rx="3" fill="#0d1117" stroke="#29b5e8" stroke-width="0.5" opacity="0.6"/>
  <text x="630" y="321" fill="#8b949e" font-size="10" text-anchor="middle">STAGING — type cast, rename, deduplicate</text>
  <rect x="420" y="330" width="420" height="18" rx="3" fill="#0d1117" stroke="#29b5e8" stroke-width="0.5" opacity="0.6"/>
  <text x="630" y="343" fill="#8b949e" font-size="10" text-anchor="middle">INTERMEDIATE — business logic, joins, enrichment</text>
  <rect x="420" y="352" width="420" height="18" rx="3" fill="#0d1117" stroke="#29b5e8" stroke-width="0.5" opacity="0.6"/>
  <text x="630" y="365" fill="#29b5e8" font-size="10" text-anchor="middle">MARTS — analytics-ready, BI-ready, dbt-tested</text>
  <text x="630" y="382" fill="#3fb950" font-size="9" text-anchor="middle">dbt: schema tests · null checks · freshness checks · referential integrity</text>

  <line x1="630" y1="388" x2="630" y2="408" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="625,408 630,416 635,408" fill="#30363d"/>

  <rect x="400" y="416" width="460" height="36" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="630" y="434" fill="#3fb950" font-size="11" text-anchor="middle">BI Tools · ML Models · Reverse-ETL · APIs</text>
  <text x="630" y="446" fill="#8b949e" font-size="10" text-anchor="middle">governed, documented, lineage-tracked</text>

  <!-- Impact bar -->
  <rect x="40" y="400" width="220" height="60" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="150" y="418" fill="#3fb950" font-size="10" font-weight="bold" text-anchor="middle">Impact</text>
  <text x="150" y="434" fill="#8b949e" font-size="9" text-anchor="middle">Latency: overnight → &lt;1 hour</text>
  <text x="150" y="448" fill="#8b949e" font-size="9" text-anchor="middle">Infra cost: -40%</text>
  <text x="150" y="462" fill="#8b949e" font-size="9" text-anchor="middle">Incident MTTR: hours → seconds</text>

  <!-- Footer -->
  <text x="450" y="500" fill="#30363d" font-size="9" text-anchor="middle">github.com/Snehabankapalli/modern-data-platform-migration</text>
</svg>
